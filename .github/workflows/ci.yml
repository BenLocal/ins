name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --features duckdb-bundled

      - name: Audit dependencies
        run: cargo audit

  build-cross:
    name: Build (${{ matrix.os }} / ${{ matrix.target }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: ins
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: ins
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: ins
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary_name: ins
          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            binary_name: ins.exe
          - os: ubuntu-latest
            target: aarch64-pc-windows-gnullvm
            binary_name: ins.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build with cross
        run: cross build --release --features duckdb-bundled --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          artifact_name="ins-${{ matrix.target }}"
          if [[ "${{ matrix.binary_name }}" == *.exe ]]; then
            artifact_name="${artifact_name}.exe"
          fi
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} "dist/${artifact_name}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ins-${{ matrix.target }}
          path: dist/ins-${{ matrix.target }}*
          if-no-files-found: error

  build-macos-cross:
    name: Build (ubuntu-latest / ${{ matrix.target }})
    if: ${{ vars.CROSS_MACOS_ENABLED == 'true' }}
    needs: check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            binary_name: ins
            cross_image_var: CROSS_TARGET_X86_64_APPLE_DARWIN_IMAGE
          - target: aarch64-apple-darwin
            binary_name: ins
            cross_image_var: CROSS_TARGET_AARCH64_APPLE_DARWIN_IMAGE
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Verify macOS cross image is configured
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            x86_64-apple-darwin)
              test -n "${CROSS_TARGET_X86_64_APPLE_DARWIN_IMAGE}"
              ;;
            aarch64-apple-darwin)
              test -n "${CROSS_TARGET_AARCH64_APPLE_DARWIN_IMAGE}"
              ;;
          esac
        env:
          CROSS_TARGET_X86_64_APPLE_DARWIN_IMAGE: ${{ vars.CROSS_TARGET_X86_64_APPLE_DARWIN_IMAGE }}
          CROSS_TARGET_AARCH64_APPLE_DARWIN_IMAGE: ${{ vars.CROSS_TARGET_AARCH64_APPLE_DARWIN_IMAGE }}

      - name: Build macOS target with cross
        run: cross build --release --features duckdb-bundled --target ${{ matrix.target }}
        env:
          CROSS_TARGET_X86_64_APPLE_DARWIN_IMAGE: ${{ vars.CROSS_TARGET_X86_64_APPLE_DARWIN_IMAGE }}
          CROSS_TARGET_AARCH64_APPLE_DARWIN_IMAGE: ${{ vars.CROSS_TARGET_AARCH64_APPLE_DARWIN_IMAGE }}

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/ins-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ins-${{ matrix.target }}
          path: dist/ins-${{ matrix.target }}
          if-no-files-found: error
