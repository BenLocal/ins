name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-tag:
    name: Verify Tag Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          cargo_version="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n1)"
          tag_version="${GITHUB_REF_NAME#v}"

          test -n "${cargo_version}"
          test -n "${tag_version}"

          if [[ "${cargo_version}" != "${tag_version}" ]]; then
            echo "tag version (${tag_version}) does not match Cargo.toml version (${cargo_version})" >&2
            exit 1
          fi

  build-release-cross:
    name: Release Build (${{ matrix.os }} / ${{ matrix.target }})
    needs: verify-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: ins
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary_name: ins
            archive_ext: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cross build --release --features duckdb-bundled --target ${{ matrix.target }}

      - name: Archive Unix release asset
        if: ${{ matrix.archive_ext == 'tar.gz' }}
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          tar -C dist -czf dist/ins-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ matrix.binary_name }}
          sha256sum dist/ins-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > dist/ins-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
          rm dist/${{ matrix.binary_name }}

      - name: Archive Windows release asset
        if: ${{ matrix.archive_ext == 'zip' }}
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          cd dist
          zip ins-${{ github.ref_name }}-${{ matrix.target }}.zip ${{ matrix.binary_name }}
          sha256sum ins-${{ github.ref_name }}-${{ matrix.target }}.zip > ins-${{ github.ref_name }}-${{ matrix.target }}.zip.sha256
          rm ${{ matrix.binary_name }}

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/ins-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}
            dist/ins-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}.sha256
          if-no-files-found: error

  build-release-macos-cross:
    name: Release Build (ubuntu-latest / ${{ matrix.target }})
    if: ${{ vars.CROSS_MACOS_ENABLED == 'true' }}
    needs: verify-tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            binary_name: ins
            archive_ext: tar.gz
          - target: aarch64-apple-darwin
            binary_name: ins
            archive_ext: tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Verify macOS cross image is configured
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            x86_64-apple-darwin)
              test -n "${CROSS_TARGET_X86_64_APPLE_DARWIN_IMAGE}"
              ;;
            aarch64-apple-darwin)
              test -n "${CROSS_TARGET_AARCH64_APPLE_DARWIN_IMAGE}"
              ;;
          esac
        env:
          CROSS_TARGET_X86_64_APPLE_DARWIN_IMAGE: ${{ vars.CROSS_TARGET_X86_64_APPLE_DARWIN_IMAGE }}
          CROSS_TARGET_AARCH64_APPLE_DARWIN_IMAGE: ${{ vars.CROSS_TARGET_AARCH64_APPLE_DARWIN_IMAGE }}

      - name: Build release binary
        run: cross build --release --features duckdb-bundled --target ${{ matrix.target }}
        env:
          CROSS_TARGET_X86_64_APPLE_DARWIN_IMAGE: ${{ vars.CROSS_TARGET_X86_64_APPLE_DARWIN_IMAGE }}
          CROSS_TARGET_AARCH64_APPLE_DARWIN_IMAGE: ${{ vars.CROSS_TARGET_AARCH64_APPLE_DARWIN_IMAGE }}

      - name: Archive release asset
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          tar -C dist -czf dist/ins-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ matrix.binary_name }}
          sha256sum dist/ins-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > dist/ins-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
          rm dist/${{ matrix.binary_name }}

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/ins-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}
            dist/ins-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}.sha256
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - verify-tag
      - build-release-cross
      - build-release-macos-cross
    if: ${{ always() && needs.verify-tag.result == 'success' && needs.build-release-cross.result == 'success' && (needs.build-release-macos-cross.result == 'success' || needs.build-release-macos-cross.result == 'skipped') }}
    permissions:
      contents: write
    steps:
      - name: Download all release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Build combined checksums file
        shell: bash
        run: |
          cd release-assets
          cat *.sha256 | sort > checksums.txt

      - name: Write release summary
        shell: bash
        run: |
          {
            echo "## Release Summary"
            echo
            echo "- Tag: \`${GITHUB_REF_NAME}\`"
            echo "- Cargo version: \`${GITHUB_REF_NAME#v}\`"
            echo "- Included artifact groups:"
            ls -1 release-assets | sed 's/^/  - /'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ins ${{ github.ref_name }}
          body: |
            Release `${{ github.ref_name }}` for `ins`.

            Included targets:
            - x86_64-unknown-linux-gnu
            - aarch64-unknown-linux-gnu
            - x86_64-unknown-linux-musl
            - aarch64-unknown-linux-musl
            - x86_64-pc-windows-gnu
            - aarch64-pc-windows-gnullvm
            - x86_64-apple-darwin (when macOS cross is enabled)
            - aarch64-apple-darwin (when macOS cross is enabled)

            Each archive includes a sibling `.sha256` file, and this release also ships a combined `checksums.txt`.
          files: |
            release-assets/*.tar.gz
            release-assets/*.zip
            release-assets/*.sha256
            release-assets/checksums.txt
          generate_release_notes: true
