# macOS targets require a custom cross image with an Apple SDK.
# Official cross images cannot ship the macOS SDK for licensing reasons.
# Configure these with environment variables in GitHub Actions, for example:
#   CROSS_TARGET_X86_64_APPLE_DARWIN_IMAGE=ghcr.io/<owner>/<repo>/cross-x86_64-apple-darwin:latest
#   CROSS_TARGET_AARCH64_APPLE_DARWIN_IMAGE=ghcr.io/<owner>/<repo>/cross-aarch64-apple-darwin:latest
[target.x86_64-apple-darwin]

[target.aarch64-apple-darwin]
